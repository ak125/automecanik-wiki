name: Dispatch rag sync on exports/rag/ changes

# Plan v3 §Étape 2 — sender côté wiki du pipeline ADR-031 §D20.
# Quand exports/rag/** change sur main, envoie un repository_dispatch
# vers automecanik-rag qui exécute sync-wiki-exports-to-rag.py.
#
# Pattern compatible cross-repo-source-catalog-gate.yml (P0b) :
#   - PAT optionnel : si RAG_DISPATCH_PAT non configuré, warn + exit 0 (no-op)
#   - Trigger ciblé : seulement push main avec changes exports/rag/**
#   - Defense in depth : safety-net schedule côté receveur (rag) catch-up daily

on:
  push:
    branches: [main]
    paths:
      - "exports/rag/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-rag-sync
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to automecanik-rag
        env:
          PAT: ${{ secrets.RAG_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${PAT:-}" ]; then
            echo "::warning::RAG_DISPATCH_PAT secret not configured — running in no-op mode."
            echo ""
            echo "To enable end-to-end sync (Étape 7 plan v3) :"
            echo "  1. Create a fine-grained PAT on ak125/automecanik-rag with"
            echo "     contents:write permission."
            echo "  2. Add as secret RAG_DISPATCH_PAT in"
            echo "     https://github.com/ak125/automecanik-wiki/settings/secrets/actions"
            echo ""
            echo "Until then, the receiver workflow (.github/workflows/sync-rag-from-wiki.yml"
            echo "in automecanik-rag) runs daily on schedule as a safety net."
            exit 0
          fi

          echo "Dispatching wiki-exports-rag-changed → ak125/automecanik-rag"
          echo "Wiki SHA: ${{ github.sha }}"

          http_code=$(curl -s -o /tmp/dispatch-response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ak125/automecanik-rag/dispatches \
            -d '{"event_type":"wiki-exports-rag-changed","client_payload":{"wiki_sha":"${{ github.sha }}","wiki_ref":"${{ github.ref }}"}}')

          if [ "$http_code" != "204" ]; then
            echo "::error::Dispatch failed: HTTP $http_code"
            cat /tmp/dispatch-response.txt
            exit 1
          fi

          echo "✓ Dispatch sent (HTTP 204)"

      - name: Summary
        if: always()
        run: |
          echo "## Dispatch rag sync summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Wiki SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -z "${{ secrets.RAG_DISPATCH_PAT }}" ]; then
            echo "- Status: ⚠️ **no-op** (RAG_DISPATCH_PAT not configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: ✓ dispatched" >> $GITHUB_STEP_SUMMARY
          fi
