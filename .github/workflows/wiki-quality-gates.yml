name: wiki-quality-gates

# Plan rev 6 §G8 — quality gates Python sur PRs et push main.
# Re-execute les 3 scripts MVP §G9-A en CI bloquante.
# Réplique côté CI ce que pre-commit fait local — défense en profondeur (§12 quality-gates).

on:
  push:
    branches: [main]
    paths:
      - 'proposals/**/*.md'
      - 'wiki/**/*.md'
      - '_scripts/*.py'
      - '_scripts/tests/**'
      - '_meta/schema/**'
      - '_meta/source-catalog.yaml'
  pull_request:
    paths:
      - 'proposals/**/*.md'
      - 'wiki/**/*.md'
      - '_scripts/*.py'
      - '_scripts/tests/**'
      - '_meta/schema/**'
      - '_meta/source-catalog.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-gates:
    name: Python quality gates (validate-frontmatter, quality-gates, compute-confidence-score)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so origin/main + merge-base resolve (score-vs-predecessor step)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install --quiet -r _scripts/tests/requirements-dev.txt

      - name: validate-frontmatter (schema v1.0+v2.0)
        run: python3 _scripts/validate-frontmatter.py --all

      - name: quality-gates §2 + §5.bis (ADR-033 + ADR-032 gates)
        run: python3 _scripts/quality-gates.py --all

      - name: compute-confidence-score --check (formula §4)
        run: python3 _scripts/compute-confidence-score.py --check --all
        continue-on-error: true   # tolérance phase d'amorçage

      - name: compute-symptom-confidence --check (ADR-033 §C8)
        run: python3 _scripts/compute-symptom-confidence.py --check --all
        continue-on-error: true   # tolérance phase d'amorçage

      - name: check-coverage-map (ADR-089 — coverage-map FK/schéma/ancrage)
        # ENFORCE (--strict, exit 1 si FAIL) : backlog nettoyé (0 FAIL au merge de cette PR).
        # --strict ne bloque QUE sur FAIL ; les WARN (coverage-map absente) restent advisory
        # (--warn-as-fail = étape ultérieure une fois les 6 WARN backfillées).
        run: python3 _scripts/check-coverage-map.py --all --strict

      - name: pytest fixtures (gates ADR-033 + ADR-032)
        run: cd _scripts/tests && python3 -m pytest -v

      # Score-and-compare-before-overwrite — REPORT-ONLY (Phase A).
      # Compare chaque fiche modifiée dans la PR à sa version sur origin/main.
      # Ne bloque jamais le build (continue-on-error) tant que la formule n'est
      # pas recalibrée — l'activation bloquante (--fail-on-regression) = ADR.
      - name: score-vs-predecessor (report-only)
        continue-on-error: true
        shell: bash
        run: |
          set -u
          # Full history is present (fetch-depth: 0). Resolve the base explicitly
          # instead of masking a failed fetch — report-only must be honest.
          if ! git rev-parse --verify --quiet origin/main >/dev/null; then
            echo "origin/main unavailable in this checkout — skipping comparison (report-only)"
            exit 0
          fi
          base=origin/main
          mapfile -t changed < <(git diff --name-only "${base}...HEAD" 2>/dev/null \
            | grep -E '^(proposals|wiki)/.*\.md$' \
            | grep -vE '^(proposals|wiki)/_' || true)
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "no fiche change vs ${base} — nothing to compare"
            exit 0
          fi
          echo "Comparing changed fiches vs ${base}:"
          python3 _scripts/compare-proposal-versions.py --base "${base}" "${changed[@]}"

  promotion-gates:
    name: Promotion gates wrappers (ADR-059 PR-4 — Pydantic-typed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps (Pydantic + Click + pytest)
        run: pip install --quiet "pydantic>=2.5,<3" "click>=8.1,<9" "pyyaml>=6.0,<7" "pytest>=7.4,<9"
      - name: Pytest 5 wrappers (architectural + smoke)
        run: cd _scripts && python3 -m pytest gates/test_gates.py -v
      - name: Sanity run on existing proposals (no-op if proposals/ empty)
        run: |
          set -e
          shopt -s nullglob
          proposals=(proposals/*.md)
          if [[ ${#proposals[@]} -eq 0 ]]; then
            echo "no proposals to scan — skipping run_all"
            exit 0
          fi
          for p in "${proposals[@]}"; do
            echo "=== $p ==="
            python3 -m _scripts.gates.run_all --target "$p" --format text || true
          done
        shell: bash

  validate-exports-seo:
    name: Validate exports/seo/ (ADR-059 PR-5a — ajv + builder pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install --quiet "click>=8.1,<9" "pyyaml>=6.0,<7" "jsonschema>=4.20,<5" "pytest>=7.4,<9"
      - name: Install ajv-cli + ajv-formats
        # ajv-cli@5 = ajv@8, qui n'embarque AUCUN format → `format: date-time`
        # (schema generated_at) rend le SCHEMA invalide (exit 1) sans ajv-formats.
        run: npm install -g ajv-cli@5 ajv-formats
      - name: Pytest builder + schema
        run: cd _scripts && python3 -m pytest test_build_exports_seo.py -v
      - name: ajv-validate existing exports/seo/*.json (no-op if empty)
        run: |
          set -e
          shopt -s nullglob
          files=(exports/seo/*/*.json)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "no exports/seo/*.json yet — skipping ajv validation"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "=== ajv $f ==="
            ajv validate -c ajv-formats --strict=false \
              -s _meta/schema/exports-seo.schema.json -d "$f"
          done
        shell: bash
