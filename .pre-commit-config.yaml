# pre-commit-config.yaml — local pre-commit hooks for automecanik-wiki.
# Install: `pip install pre-commit && pre-commit install`. CI runs the same hooks via lint.yml.
#
# Source of truth for tool selection: ADR-031 + Phase B.3 (D6 mdformat, not prettier).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        files: \.md$
        # _templates/ uses Obsidian Templater syntax (<% tp.file.title %>) that mdformat
        # would escape. _meta/agent-exit-contract.md is the AEC distribution copy and must
        # remain byte-identical to the vault canon (verified via canon-hashes.json hash).
        # log.md is auto-generated by the Claude Code session-log Stop hook and embeds
        # raw commit messages verbatim — letting mdformat escape them creates an infinite
        # rewrite loop (each commit re-injects an unescaped line on the next run).
        # wiki/ and proposals/ are the Obsidian-first canonical/staging content layers
        # (ADR-031). They use [[wikilinks]] for vault graph navigation and [^footnotes]
        # for sourcing — mdformat escapes both to \[\[…\]\] / \[^…\] and converts ---
        # horizontal rules to ___ underscores, all of which break Obsidian rendering and
        # the footnote feature. Quality is enforced by the Python gates (validate-
        # frontmatter, quality-gates, confidence-score) which understand the Obsidian
        # superset of CommonMark.
        exclude: ^(_templates/|_meta/agent-exit-contract\.md$|log\.md$|wiki/|proposals/)
        additional_dependencies:
          - mdformat-gfm==0.3.6
          - mdformat-frontmatter==2.0.8
          - mdformat-tables==1.0.0

  - repo: local
    hooks:
      - id: validate-frontmatter
        name: validate frontmatter against _meta/schema/ (Node legacy)
        entry: node _scripts/validate-frontmatter.mjs
        language: system
        files: ^(wiki|proposals)/.*\.md$
        pass_filenames: true

      - id: check-slug-uniqueness
        name: check slug uniqueness
        entry: node _scripts/check-slug-uniqueness.mjs
        language: system
        pass_filenames: false
        files: ^(wiki|proposals)/.*\.md$

      - id: check-extension-whitelist
        name: check extension whitelist
        entry: node _scripts/check-extension-whitelist.mjs
        language: system
        pass_filenames: false

      # Plan rev 6 §G9-A — Python MVP scripts (quality gates §2 + confidence_score §4)
      - id: wiki-frontmatter-schema-py
        name: Validate frontmatter (JSON Schema 2020-12, Python)
        entry: python3 _scripts/validate-frontmatter.py
        language: system
        files: ^(wiki|proposals)/.*\.md$
        exclude: ^(wiki|proposals)/_

      - id: wiki-quality-gates
        name: Run quality gates §2 (schema, sources, catalog_leak, commercial_promise, safety_unsourced)
        entry: python3 _scripts/quality-gates.py
        language: system
        files: ^(wiki|proposals)/.*\.md$
        exclude: ^(wiki|proposals)/_

      - id: wiki-confidence-score
        name: Verify confidence_score matches formula §4 (check-only ; --fix manuel séparé)
        entry: python3 _scripts/compute-confidence-score.py --check
        language: system
        files: ^(wiki|proposals)/.*\.md$
        exclude: ^(wiki|proposals)/_
