# source-catalog.yaml — référentiel canonique des slugs sources stables
#
# Référence ADR-033 §D1 : `diagnostic_relations[].sources[]` doit citer un slug stable
# (pas une URL brute). Ce fichier est le registre canon.
#
# Règle d'enforcement (`_scripts/quality-gates.py`) :
#   tout slug cité dans `diagnostic_relations[].sources[]` (ou autre source_refs typé slug)
#   DOIT exister dans `sources[].slug` ci-dessous. Sinon → blocked_reasons: [source_slug_unknown].
#
# Ajout d'une nouvelle source :
#   - PR avec entrée minimale (slug, title, type, archived_at, license)
#   - `type` détermine `max_confidence` autorisé (cf. `_meta/source-policy.md` §9)
#
# Référence canon : `_meta/source-policy.md`, ADR-033

schema_version: 1.0.0
updated_at: '2026-06-12'

# Mapping source_type → max confidence autorisée — SoT MACHINE UNIQUE (miroir prose : source-policy.md §9.1).
# Cutover S1d FAIT : _scripts/quality-gates.py lit cette map directement (lecture unique, plus de dict
# hardcodé). _scripts/tests/test_source_type_confidence_parity.py garde que le loader du gate renvoie
# exactement cette map (régression loader). Éditer ICI = seule source de vérité.
source_type_max_confidence:
  oem_manual: high
  oem_workshop: high
  tecdoc_official: high
  normative_standard: high
  parts_feed_certified: high
  brochure: medium
  formation: medium
  marketing: medium
  blog_pro: medium
  forum: low
  wiki_externe: low
  blog_consumer: low

# Conventions :
# - status: 'active' (défaut implicite) → la source est archivée et le fichier
#   `archived_at` existe dans automecanik-raw. La fiche peut s'appuyer dessus.
# - status: 'to_capture' → la source est référencée par sa taxonomie (slug, type,
#   publisher) mais le document n'est pas encore archivé physiquement. Le path
#   `archived_at` indique l'emplacement futur prévu. Tant que la source reste
#   `to_capture`, les fiches qui la citent gardent automatiquement
#   `diagnostic_safe: false` (corroboration externe non vérifiable).

